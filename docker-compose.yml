services:
  pain-db:
    image: postgres:16
    container_name: pain-db
    restart: always
    environment:
      POSTGRES_DB: pain
      POSTGRES_USER: pain
      POSTGRES_PASSWORD: pain
    volumes:
      - db-data:/var/lib/postgresql/data
    ports:
      - "5435:5432"
    networks:
      - pain-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U pain -d pain"]
      interval: 10s
      timeout: 5s
      retries: 5

  pain-ldap:
    image: osixia/openldap:1.5.0
    container_name: pain-ldap
    restart: always
    environment:
      LDAP_ORGANISATION: "Exemple"
      LDAP_DOMAIN: "example.fr"
      LDAP_ADMIN_PASSWORD: adminpass
      LDAP_BASE_DN: "dc=example,dc=fr"
      LDAP_TLS: "false"
    volumes:
      - ldap-data:/var/lib/ldap
      - ldap-config:/etc/ldap/slapd.d
      - ./ldap/users.ldif:/container/service/slapd/assets/config/bootstrap/ldif/custom/users.ldif:ro
    command: "--copy-service"
    networks:
      - pain-network

  pain-redis:
    image: redis:7-alpine
    container_name: pain-redis
    restart: always
    networks:
      - pain-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

  pain-back:
    build:
      context: ./back
      dockerfile: Dockerfile
    container_name: pain-back
    env_file:
      - ./back/.env
    environment:
      - TZ=Europe/Paris
      # Mode local : sert le plan depuis tours.json (pas de SSH requis).
      # Passer à false quand l'accès SSH au serveur VTOM est rétabli.
      - VTOM_LOCAL_MODE=true
    volumes:
      - ./scripts:/var/www/html/scripts
      - ./logs:/var/www/html/storage/logs
      - ./tours.json:/var/www/html/storage/app/tours.json:ro
    networks:
      - pain-network
    depends_on:
      pain-db:
        condition: service_healthy
      pain-redis:
        condition: service_healthy
      pain-ldap:
        condition: service_started
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8000/api/health || exit 1"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 10s

  pain-front:
    build:
      context: ./front
      dockerfile: Dockerfile
    container_name: pain-front
    volumes:
      - front-dist:/app/dist
    networks:
      - pain-network
    depends_on:
      - pain-back
    healthcheck:
      test: ["CMD-SHELL", "test -f /app/dist/index.html || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 20
      start_period: 60s

  pain-nginx:
    image: nginx:alpine
    container_name: pain-nginx
    ports:
      - "8080:80"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - front-dist:/usr/share/nginx/html:ro
    networks:
      - pain-network
    depends_on:
      pain-front:
        condition: service_healthy
      pain-back:
        condition: service_healthy

networks:
  pain-network:

volumes:
  db-data:
  ldap-data:
  ldap-config:
  front-dist:
